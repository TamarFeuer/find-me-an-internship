<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find Me an Internship</title>
  <link rel="icon" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Find Me an Internship</h1>

    <div class="tabs">
      <button id="tab-match" class="tab active">Match jobs to CV</button>
      <button id="tab-companies" class="tab">Company list</button>
    </div>

    <section id="match-view">
      <p class="intro">Score live job listings against your CV and rank them by fit.</p>
      <div class="search">
        <label class="field">
          <span>Role</span>
          <input type="text" id="what" value="software developer">
        </label>
        <label class="field">
          <span>Location</span>
          <input type="text" id="where" value="amsterdam">
        </label>
        <label class="field">
          <span>Exclude words</span>
          <input type="text" id="exclude" value="senior">
        </label>
      </div>
      <div class="controls">
        <label for="cv-file" class="upload-label">Upload your CV as PDF</label>
        <input type="file" id="cv-file" accept="application/pdf" hidden>
        <button id="find-btn">Find matches</button>
      </div>
      <span id="file-name" class="file-name"></span>
      <p id="status"></p>
      <ul id="results"></ul>
    </section>

    <section id="companies-view" hidden>
      <p class="intro">Companies known to hire interns, loaded from a file you provide. Ranked by how many interns they have hosted; reach out to a past intern as a referral.</p>
      <ul id="company-list"></ul>
    </section>
  </main>
  <!-- dist/app.js is generated from src/app.ts by tsc (npm run build) -->
  <script src="dist/app.js"></script>
</body>
</html>
